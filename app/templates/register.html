<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ChitChat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <main class="auth-card">
        <h1>ChitChat</h1>
        <p class="subtitle">Register (invite code required)</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('register_page') }}">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required autocomplete="username">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="new-password" minlength="4">
            <label for="invite_code">Invite code</label>
            <input id="invite_code" name="invite_code" type="text" required placeholder="Enter invite code">
            <label class="checkbox-label">
                <input type="checkbox" name="remember" value="1" id="remember" checked>
                Remember me
            </label>
            <button type="submit">Register</button>
        </form>
        <p class="footer"><a href="{{ url_for('login_page') }}">Log in</a></p>
    </main>
</body>
</html>
