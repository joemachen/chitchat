<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete account — ChitChat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <main class="auth-card">
        <h1>Delete my account</h1>
        <p class="subtitle">This action cannot be undone. All your messages and data will be removed.</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('delete_account') }}" onsubmit="return confirm('Are you sure? Your account and all your messages will be permanently deleted.');">
            <label for="confirm">Type <strong>DELETE</strong> to confirm</label>
            <input id="confirm" name="confirm" type="text" required autocomplete="off" placeholder="DELETE">
            <button type="submit" class="danger">Delete my account</button>
        </form>
        <p class="footer">
            <a href="{{ url_for('chat') }}">Cancel and return to chat</a>
        </p>
    </main>
</body>
</html>
