            .room-list { left: 0; }
            .user-list { left: auto; right: 0; transform: translateX(100%); border-left: none; border-right: 1px solid #27272a; }
            .room-list.open { transform: translateX(0); box-shadow: 4px 0 12px rgba(0,0,0,0.3); }
            .user-list.open { transform: translateX(0); box-shadow: -4px 0 12px rgba(0,0,0,0.3); }
            .main { flex: 1; min-width: 0; }
            .chat-area { min-width: 0; }
            .msg { max-width: 95%; }
            .header h1 { font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50%; }
            .form-wrap input[type="text"], .form-wrap button { min-height: 44px; }
            .room-list-footer button, .room-item, .user-item { min-height: 44px; padding-top: 0.5rem; padding-bottom: 0.5rem; }
        }
        body.theme-light .room-list.open { box-shadow: 4px 0 12px rgba(0,0,0,0.2); }
        body.theme-light .user-list.open { box-shadow: -4px 0 12px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="contextMenu" class="context-menu" style="display: none;">
        <button type="button" data-action="view-profile">View profile</button>
        <button type="button" data-action="message-user">Message</button>
        <button type="button" data-action="mute-in-room">Mute in this room</button>
        <button type="button" data-action="kick-user">Kick user</button>
    </div>
    <div id="messageContextMenu" class="context-menu" style="display: none;">
        <button type="button" data-action="reply-to-message">Reply</button>
        <button type="button" data-action="edit-message">Edit</button>
        <button type="button" data-action="delete-message">Delete</button>
        <button type="button" data-action="hide-message" id="hideMessageBtn">Hide</button>
        <button type="button" data-action="unhide-message" id="unhideMessageBtn" style="display:none;">Unhide</button>
        <button type="button" data-action="mute-message-user-in-room">Mute in this room</button>
        <button type="button" data-action="report-message">Report message</button>
        <button type="button" data-action="mark-unread">Mark unread</button>
        <button type="button" data-action="message-view-profile">View profile</button>
        <button type="button" data-action="message-whois">Whois</button>
    </div>
    <div id="profileModal" class="profile-modal" style="display: none;">
        <h3 id="profileUsername">—</h3>
        <p id="profileMemberSince"></p>
        <button type="button" class="close" id="profileModalClose">Close</button>
    </div>
    <div id="whoisModal" class="profile-modal" style="display: none;">
        <h3 id="whoisUsername">—</h3>
        <p id="whoisDisplayName" style="display:none;"></p>
        <p id="whoisCreated"></p>
        <p id="whoisOnline"></p>
        <p id="whoisLastSeen" style="display:none;"></p>
        <p id="whoisStatus" style="display:none;"></p>
        <p id="whoisIp"></p>
        <p id="whoisConnected"></p>
        <p id="whoisSharedRooms" style="display:none;"></p>
        <button type="button" class="close" id="whoisModalClose">Close</button>
    </div>
    <div id="modalBackdrop" class="modal-backdrop" style="display: none;"></div>
    <div id="searchResultsModal" class="search-results-modal" style="display: none;">
        <h3 id="searchResultsTitle">Search results</h3>
        <div class="search-results-list" id="searchResultsList"></div>
        <button type="button" class="close" id="searchResultsClose" style="margin-top:0.75rem;">Close</button>
    </div>
    <div class="header">
        <button type="button" id="menuToggleBtn" class="mobile-menu-btn" aria-label="Toggle rooms">☰</button>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="" class="header-logo" aria-hidden="true">
        <h1>{{ server_name|default('No Homers Club') }} — {{ user.username }}</h1>
        <div class="header-actions">
            <button type="button" id="usersToggleBtn" class="mobile-menu-btn" aria-label="Toggle users">👥</button>
            <span class="header-settings-logout">
                <button type="button" id="settingsBtn">Settings</button>
                <form action="{{ url_for('logout') }}" method="post" style="display:inline;">
                    <button type="submit">Log out</button>
                </form>
            </span>
        </div>
    </div>
    <div class="status" id="status">Connecting…</div>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>
    <div class="main">
        <aside class="room-list" id="roomList">
            <div class="room-list-title">ROOMS</div>
            <div class="room-list-items" id="roomListItems"></div>
            <div class="panel-resizer" id="panelResizer" title="Drag to resize"></div>
            <div class="message-list-title">MESSAGES</div>
            <div class="message-list-items" id="messageListItems"></div>
            <div class="room-list-footer">
                {% if user.is_super_admin or (user_permissions|default({})).get('create_room') %}
                <button type="button" id="newRoomBtn">+ New room</button>
                {% endif %}
            </div>
            <div class="room-list-footer-mobile">
                <button type="button" id="settingsBtnMobile">Settings</button>
                <form action="{{ url_for('logout') }}" method="post" style="display:inline;">
                    <button type="submit">Log out</button>
                </form>
            </div>
        </aside>
        <div class="chat-area">
            <div class="channel-topic empty" id="channelTopic"></div>
            <div class="search-bar-wrap" id="searchBarWrap">
                <button type="button" id="searchToggleBtn" class="search-toggle-btn" title="Search in this room">Search</button>
                <div class="search-drawer" id="searchDrawer">
                    <form id="searchForm" class="search-form">
                        <input type="text" id="searchInput" placeholder="Search in this room…" autocomplete="off">
                        <button type="submit" id="searchBtn">Search</button>
                    </form>
                </div>
            </div>
            <div class="messages-wrap" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;">
                <div class="load-more-wrap" id="loadMoreWrap" style="display:none;"><button type="button" id="loadMoreBtn">Load older messages</button></div>
                <div class="messages" id="messages"></div>
            </div>
            <div class="typing-indicator empty" id="typingIndicator"></div>
            <div class="acro-timer hidden" id="acroTimer"></div>
            <div class="form-wrap">
                <form id="sendForm">
                    <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.zip">
                    <button type="button" id="attachBtn" class="attach-btn" title="Attach file or image">📎</button>
                    <input type="text" id="input" placeholder="Type a message…" autocomplete="off">
                    <button type="submit" id="sendBtn" disabled>Send</button>
                </form>
            </div>
        </div>
        <aside class="user-list" id="userList">
            <div class="user-list-title">Users</div>
            <div class="user-list-section" id="userListOnline">
                <div class="user-list-title">Online</div>
                <div id="userListOnlineItems"></div>
            </div>
            <div class="user-list-section" id="userListOffline">
                <div class="user-list-title">Offline</div>
                <div id="userListOfflineItems"></div>
            </div>
        </aside>
    </div>

    <script>
(function() {
    const currentUserId = {{ user.id }};
    const isSuperAdmin = {{ 'true' if user.is_super_admin else 'false' }};
    const userPermissions = {{ (user_permissions|default({}))|tojson|safe }};
    let socket = null;
    var roomMutedInRoom = {};  // room_id -> Set of muted user_ids
    let currentRoom = null;
    let allRooms = [];
    let allUsersWithStatus = [];
    let showingSettings = false;
    let acrobotActive = true;
    var settingsPendingSettings = null;
    const messagesEl = document.getElementById('messages');
    const statusEl = document.getElementById('status');
    const sendForm = document.getElementById('sendForm');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const userListOnlineItems = document.getElementById('userListOnlineItems');
    const userListOfflineItems = document.getElementById('userListOfflineItems');
    const roomListItemsEl = document.getElementById('roomListItems');
    const messageListItemsEl = document.getElementById('messageListItems');
    const newRoomBtn = document.getElementById('newRoomBtn');
    const channelTopicEl = document.getElementById('channelTopic');
    const searchBarWrapEl = document.getElementById('searchBarWrap');
    const searchDrawerEl = document.getElementById('searchDrawer');
    const searchToggleBtn = document.getElementById('searchToggleBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const loadMoreWrap = document.getElementById('loadMoreWrap');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const typingIndicatorEl = document.getElementById('typingIndicator');
    const acroTimerEl = document.getElementById('acroTimer');
    var roomOrderIds = [];
    var hasMoreMessages = false;
    var typingUsers = {};
    var typingTimeout = null;
    var replyToMessageId = null;
    var replyToContent = null;
    var replyToDisplayName = null;
    var pendingAttachment = null;  // { url, filename }
    var unreadMentions = {}; // room_id -> Set of message_id
    var unreadRooms = {};    // room_id -> true when room has new message(s) not yet read
    var lastReadByRoom = {}; // room_id -> last message id we've "read" (cleared highlight)
    var baseTitle = document.title || 'No Homers Club';
    var acroPhase = null;
    var acroEndTime = null;
    var acroTimerInterval = null;
    var messagesSectionHeight = parseInt(localStorage.getItem('chitchatMessagesSectionHeight') || '80', 10) || 80;

    function addUnreadMention(roomId, msgId) {
        if (!unreadMentions[roomId]) unreadMentions[roomId] = new Set();
        unreadMentions[roomId].add(msgId);
        updateUnreadBadge();
        var roomEl = document.querySelector('.room-item[data-room-id="' + roomId + '"]');
        if (roomEl) roomEl.classList.add('mentioned');
    }
    function addUnreadForRoom(roomId) {
        if (currentRoom && currentRoom.id === roomId) return;
        unreadRooms[roomId] = true;
        updateUnreadBadge();
        var roomEl = document.querySelector('.room-item[data-room-id="' + roomId + '"]');
        if (roomEl) {
            var dot = roomEl.querySelector('.room-item-unread-dot');
            if (dot) dot.style.display = 'inline-block';
        }
    }
    function clearUnreadForRoom(roomId) {
        if (unreadMentions[roomId]) { unreadMentions[roomId].clear(); delete unreadMentions[roomId]; }
        delete unreadRooms[roomId];
        lastReadByRoom[roomId] = true;
        updateUnreadBadge();
        var roomEl = document.querySelector('.room-item[data-room-id="' + roomId + '"]');
        if (roomEl) {
            roomEl.classList.remove('mentioned');
            var dot = roomEl.querySelector('.room-item-unread-dot');
            if (dot) dot.style.display = 'none';
        }
        if (currentRoom && currentRoom.id === roomId) messagesEl.querySelectorAll('.msg').forEach(function(el) { el.classList.remove('mentioned'); });
    }
    function isMessageUnread(roomId, msgId) {
        return unreadMentions[roomId] && unreadMentions[roomId].has(msgId);
    }
    function updateUnreadBadge() {
        var count = 0;
        Object.keys(unreadRooms).forEach(function() { count += 1; });
        Object.keys(unreadMentions).forEach(function(rid) { count += (unreadMentions[rid] && unreadMentions[rid].size) || 0; });
        document.title = (count > 0 ? '(' + count + ') ' : '') + baseTitle;
        var link = document.querySelector('link[rel="icon"]') || document.createElement('link');
        if (!link.getAttribute('rel')) { link.rel = 'icon'; document.head.appendChild(link); }
        if (count > 0) {
            if (!link.dataset.originalFavicon) link.dataset.originalFavicon = link.href || '';
            var canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0f0f12';
            ctx.fillRect(0, 0, 32, 32);
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(24, 8, 6, 0, Math.PI * 2);
            ctx.fill();
            link.href = canvas.toDataURL('image/png');
        } else {
            link.href = link.dataset.originalFavicon || '';
        }
    }

    function setStatus(text) { statusEl.textContent = text; }
    function setConnected(ok) { sendBtn.disabled = !ok; setStatus(ok ? 'Connected' : statusEl.textContent); }

    function isHidden(msg) {
        if (currentRoom && msg.room_id === currentRoom.id && roomMutedInRoom[currentRoom.id] && roomMutedInRoom[currentRoom.id].has(msg.user_id)) return true;
        return false;
    }

    function getHiddenMessageIds() {
        try {
            var raw = localStorage.getItem('chitchatHiddenMessages');
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }
    function setMessageHidden(msgId, hidden) {
        var ids = getHiddenMessageIds();
        var idx = ids.indexOf(msgId);
        if (hidden && idx === -1) ids.push(msgId);
        else if (!hidden && idx !== -1) ids.splice(idx, 1);
        localStorage.setItem('chitchatHiddenMessages', JSON.stringify(ids));
    }
    function isMessageUserHidden(msgId) { return getHiddenMessageIds().indexOf(msgId) !== -1; }

    function formatTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short', hour12: true });
    }

    function renderMessage(msg, isOwn) {
        const isEmote = msg.message_type === 'emote';
        const userHidden = isMessageUserHidden(msg.id);
        const div = document.createElement('div');
        div.className = 'msg' + (isOwn ? ' own' : '') + (isEmote ? ' emote' : '') + (isHidden(msg) ? ' hidden' : '') + (userHidden ? ' msg-user-hidden' : '');
        div.dataset.msgId = msg.id;
        div.dataset.userId = msg.user_id;
        if (msg.room_id != null && isMessageUnread(msg.room_id, msg.id)) div.classList.add('mentioned');
        var displayName = (msg.display_name && msg.display_name.trim()) ? msg.display_name : (msg.username || '?');
        var uname = escapeHtml(displayName);
        var contentHtml;
        if (isEmote) {
            contentHtml = '<em>* ' + escapeHtml(msg.username || '?') + ' ' + linkify(msg.content) + '</em>';
        } else {
            var raw = msg.content || '';
            contentHtml = typeof marked !== 'undefined' ? marked.parse(raw) : escapeHtml(raw);
            contentHtml = contentHtml.replace(/(https?:\/\/[^\s<>"']+)/g, function(match) {
                var offset = arguments[arguments.length - 2];
                var fullStr = arguments[arguments.length - 1];
                if (offset > 0 && fullStr[offset - 1] === '"') return match;
                var url = match.replace(/[.,;:)]+$/, '');
                var isGif = /\.gif(\?|$)/i.test(url) || /giphy\.com.*\.gif/i.test(url);
                if (isGif) return '<a href="' + escapeAttr(url) + '" target="_blank" rel="noopener noreferrer"><img src="' + escapeAttr(url) + '" class="msg-inline-gif" alt="GIF" loading="lazy"></a>';
                return '<a href="' + escapeAttr(match) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(match) + '</a>';
            });
        }
        var quoteHtml = '';
        if (msg.parent_id && (msg.parent_content != null || msg.parent_username != null)) {
            var pName = (msg.parent_display_name && msg.parent_display_name.trim()) ? msg.parent_display_name : (msg.parent_username || '?');
            quoteHtml = '<div class="msg-quote" data-parent-id="' + escapeAttr(String(msg.parent_id)) + '" title="Jump to original message"><strong>' + escapeHtml(pName) + '</strong>: ' + escapeHtml((msg.parent_content || '').slice(0, 200)) + ((msg.parent_content || '').length > 200 ? '…' : '') + '</div>';
        }
        var editedHtml = '';
        if (msg.edited_at) {
            editedHtml = '<div class="msg-edited">edited ' + formatTime(msg.edited_at) + '</div>';
        }
        var attachmentHtml = '';
        if (msg.attachment_url) {
            var ext = (msg.attachment_filename || '').split('.').pop().toLowerCase();
            var isImg = ['png','jpg','jpeg','gif','webp','svg'].indexOf(ext) !== -1;
            if (isImg) {
                attachmentHtml = '<div class="msg-attachment"><a href="' + escapeAttr(msg.attachment_url) + '" target="_blank" rel="noopener noreferrer"><img src="' + escapeAttr(msg.attachment_url) + '" alt="' + escapeAttr(msg.attachment_filename || '') + '"></a></div>';
            } else {
                attachmentHtml = '<div class="msg-attachment"><a class="attachment-file" href="' + escapeAttr(msg.attachment_url) + '" target="_blank" rel="noopener noreferrer">📎 ' + escapeHtml(msg.attachment_filename || 'Attachment') + '</a></div>';
            }
        }
        var linkPreviewsHtml = '';
        if (msg.link_previews && msg.link_previews.length) {
            msg.link_previews.forEach(function(p) {
                var title = (p.title && p.title.trim()) ? escapeHtml(p.title) : '';
                var desc = (p.description && p.description.trim()) ? escapeHtml(p.description) : '';
                var img = (p.image && p.image.trim()) ? '<img class="link-preview-img" src="' + escapeAttr(p.image) + '" alt="">' : '';
                linkPreviewsHtml += '<div class="msg-link-preview" data-url="' + escapeAttr(p.url || '') + '"><div class="link-preview-header"><a href="' + escapeAttr(p.url || '') + '" target="_blank" rel="noopener noreferrer">' + escapeHtml((p.url || '').replace(/^https?:\/\//, '')) + '</a><button type="button" class="link-preview-minimize" title="Minimize">−</button></div><div class="link-preview-body">' + (title ? '<div class="link-preview-title">' + title + '</div>' : '') + (desc ? '<div class="link-preview-desc">' + desc + '</div>' : '') + img + '</div></div>';
            });
        }
        div.innerHTML =
            '<div class="msg-collapsed-bar" title="Click to unhide">' +
            '<span aria-hidden="true">👁️‍🗨️</span> Hidden message — click or right-click to unhide</div>' +
            '<div class="msg-header"><span class="msg-username" data-user-id="' + msg.user_id + '" data-username="' + escapeAttr(msg.username || '') + '">' + uname + '</span> <span class="msg-time">' + formatTime(msg.created_at) + '</span></div>' +
            (quoteHtml || '') +
            '<div class="msg-content">' + contentHtml + '</div>' +
            (attachmentHtml || '') +
            (editedHtml || '') +
            (linkPreviewsHtml ? '<div class="msg-link-previews">' + linkPreviewsHtml + '</div>' : '') +
            '');
        div.querySelectorAll('.msg-link-preview .link-preview-minimize').forEach(function(btn) {
            btn.addEventListener('click', function() { this.closest('.msg-link-preview').classList.add('minimized'); });
        });
        var collapsedBar = div.querySelector('.msg-collapsed-bar');
        if (collapsedBar && userHidden) {
            collapsedBar.addEventListener('click', function(e) {
                e.stopPropagation();
                setMessageHidden(msg.id, false);
                div.classList.remove('msg-user-hidden');
            });
        }
        div.querySelectorAll('.msg-quote[data-parent-id]').forEach(function(el) {
            el.addEventListener('click', function() {
                var pid = el.getAttribute('data-parent-id');
                var parentEl = messagesEl.querySelector('.msg[data-msg-id="' + pid + '"]');
                if (parentEl) { parentEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); parentEl.classList.add('highlight-reply-target'); setTimeout(function() { parentEl.classList.remove('highlight-reply-target'); }, 1500); }
            });
        });
        return div;
    }

    function showUploadToast(msg, isError) {
        var el = document.createElement('div');
        el.className = 'ping-toast';
        el.style.background = isError ? '#7f1d1d' : '#166534';
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
    }

    function showPingToast(fromUsername) {
        var el = document.createElement('div');
        el.className = 'ping-toast';
        el.textContent = fromUsername + ' pinged you!';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
    }

    function showTopicToast(setByUsername) {
        var el = document.createElement('div');
        el.className = 'topic-toast';
        el.textContent = 'Channel topic updated by ' + (setByUsername || 'someone') + '.';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
    }

    function renderChannelTopic(room) {
        if (!channelTopicEl) return;
        if (!room || !room.topic) {
            channelTopicEl.classList.add('empty');
            channelTopicEl.innerHTML = '';
            return;
        }
        channelTopicEl.classList.remove('empty');
        var setBy = room.topic_set_by_username || 'Someone';
        var setAt = room.topic_set_at ? new Date(room.topic_set_at).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' }) : '';
        channelTopicEl.innerHTML = '<strong>Topic:</strong> ' + escapeHtml(room.topic) + (setBy || setAt ? ' <span style="color:#71717a;">— Set by ' + escapeHtml(setBy) + (setAt ? ' on ' + setAt : '') + '</span>' : '');
    }

    var contextMenuEl = document.getElementById('contextMenu');
    var contextMenuTarget = null;
    var kickBtn = contextMenuEl.querySelector('[data-action="kick-user"]');
    var muteInRoomBtn = contextMenuEl.querySelector('[data-action="mute-in-room"]');
    function showContextMenu(x, y, userId, username) {
        contextMenuTarget = { user_id: userId, username: username };
        kickBtn.style.display = (userId !== currentUserId && (isSuperAdmin || (userPermissions && userPermissions.kick_user))) ? 'block' : 'none';
        var inRoom = currentRoom && currentRoom.name && currentRoom.name.toLowerCase() !== 'stats' && userId !== currentUserId;
        if (muteInRoomBtn) {
            muteInRoomBtn.style.display = inRoom ? 'block' : 'none';
            var muted = inRoom && roomMutedInRoom[currentRoom.id] && roomMutedInRoom[currentRoom.id].has(userId);
            muteInRoomBtn.textContent = muted ? 'Unmute in this room' : 'Mute in this room';
        }
        contextMenuEl.style.left = x + 'px';
        contextMenuEl.style.top = y + 'px';
        contextMenuEl.style.display = 'block';
    }
    function hideContextMenu() {
        contextMenuEl.style.display = 'none';
        contextMenuTarget = null;
    }
    document.addEventListener('click', function(e) {
        if (e.target.closest('#contextMenu')) return;
        hideContextMenu();
    });
    var messageContextMenuEl = document.getElementById('messageContextMenu');
    var messageContextTarget = null;
    var muteMsgUserBtn = messageContextMenuEl.querySelector('[data-action="mute-message-user-in-room"]');
    var hideMsgBtn = messageContextMenuEl.querySelector('[data-action="hide-message"]');
    var unhideMsgBtn = messageContextMenuEl.querySelector('[data-action="unhide-message"]');
    function showMessageContextMenu(x, y, messageId, userId, content, displayName) {
        messageContextTarget = { messageId: messageId, userId: userId, content: content || '', displayName: displayName || '?' };
        var editBtn = messageContextMenuEl.querySelector('[data-action="edit-message"]');
        var delBtn = messageContextMenuEl.querySelector('[data-action="delete-message"]');
        if (editBtn) editBtn.style.display = (userId === currentUserId) ? 'block' : 'none';
        if (delBtn) delBtn.style.display = (userId === currentUserId) ? 'block' : 'none';
        var msgUserHidden = isMessageUserHidden(messageId);
        if (hideMsgBtn) hideMsgBtn.style.display = msgUserHidden ? 'none' : 'block';
        if (unhideMsgBtn) unhideMsgBtn.style.display = msgUserHidden ? 'block' : 'none';
        if (muteMsgUserBtn) {
            var inRoom = currentRoom && currentRoom.name && currentRoom.name.toLowerCase() !== 'stats' && userId !== currentUserId;
            muteMsgUserBtn.style.display = inRoom ? 'block' : 'none';
            var muted = inRoom && roomMutedInRoom[currentRoom.id] && roomMutedInRoom[currentRoom.id].has(userId);
            muteMsgUserBtn.textContent = muted ? 'Unmute in this room' : 'Mute in this room';
        }
        messageContextMenuEl.style.left = x + 'px';
        messageContextMenuEl.style.top = y + 'px';
        messageContextMenuEl.style.display = 'block';
    }
    function hideMessageContextMenu() {
        messageContextMenuEl.style.display = 'none';
        messageContextTarget = null;
    }

    document.addEventListener('contextmenu', function(e) {
        if (e.target.closest('#contextMenu') || e.target.closest('#messageContextMenu')) return;
        if (e.target.closest('.msg-username') || e.target.closest('.user-item[data-user-id]')) return;

    function escapeHtml(s) {
        const el = document.createElement('div');
        el.textContent = s;
        return el.innerHTML;
    }

    function escapeAttr(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function linkify(s) {
        if (!s) return '';
        var urlRegex = /https?:\/\/[^\s<>"\']+/g;
        var out = [];
        var lastIndex = 0;
        var match;
        while ((match = urlRegex.exec(s)) !== null) {
            out.push(escapeHtml(s.slice(lastIndex, match.index)));
            var url = match[0];
            out.push('<a href="' + escapeAttr(url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(url) + '</a>');
            lastIndex = match.index + url.length;
        }
        out.push(escapeHtml(s.slice(lastIndex)));
        return out.join('');
    }

    function setAcroPhase(phase, endTime) {
        acroPhase = phase;
        acroEndTime = endTime;
        if (acroTimerInterval) { clearInterval(acroTimerInterval); acroTimerInterval = null; }
        if (!acroTimerEl) return;
        if ((phase === 'submitting' || phase === 'voting') && endTime != null) {
            acroTimerEl.classList.remove('hidden');
            function tick() {
                var now = Date.now() / 1000;
                var sec = Math.max(0, Math.floor(acroEndTime - now));
                if (sec <= 0) {
                    if (acroTimerInterval) { clearInterval(acroTimerInterval); acroTimerInterval = null; }
                    acroPhase = 'idle';
                    acroEndTime = null;
                    acroTimerEl.classList.add('hidden');
                    acroTimerEl.textContent = '';
                    return;
                }
                var label = acroPhase === 'submitting' ? 'Submit' : 'Vote';
                acroTimerEl.textContent = label + ': ' + sec + 's';
            }
            tick();
            acroTimerInterval = setInterval(tick, 1000);
        } else {
            acroTimerEl.classList.add('hidden');
            acroTimerEl.textContent = '';
        }
    }

            html += '<h2>Channels</h2><p style="color:#a1a1aa;font-size:0.9rem;margin:0 0 0.5rem;">Protected channels (Stats, Acrophobia, System Events) can only be removed here.</p>';
            (allRooms || []).forEach(function(r) {
                var isProtected = ['general', 'Stats', 'Acrophobia', 'System Events'].indexOf(r.name) !== -1;
                html += '<div class="user-row" style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">' +

                    '<span style="display:flex;gap:0.35rem;">' +
                    (r.name !== 'general' ? '<button type="button" class="settings-delete-room" data-room-id="' + r.id + '" data-room-name="' + escapeAttr(r.name) + '" style="padding:0.25rem 0.5rem;font-size:0.8rem;background:#3f3f46;border:none;border-radius:4px;color:#e4e4e7;cursor:pointer;">Delete</button>' : '') +
                    '<button type="button" class="settings-wipe-room" data-room-id="' + r.id + '" data-room-name="' + escapeAttr(r.name) + '" style="padding:0.25rem 0.5rem;font-size:0.8rem;background:#451a03;border:none;border-radius:4px;color:#fdba74;cursor:pointer;">Wipe history</button>' +
                    '</span></div>';
            });
        }
        if (isSuperAdmin) {
            var ranks = [
                { value: 'rookie', label: 'Rookie' },
                { value: 'bro', label: 'Bro' },
                { value: 'fam', label: 'Fam' },
                { value: 'super_admin', label: 'Surfer Girl' }
            ];
            html += '<h2>Users — Rankings</h2><p style="color:#a1a1aa;font-size:0.9rem;margin:0 0 0.5rem;">Only Surfer Girls can set user rankings (lowest to highest: Rookie, Bro, Fam, Surfer Girl). Surfer Girls can configure permissions for each role below.</p>';
            (allUsersWithStatus || []).forEach(function(u) {
                var me = u.id === currentUserId;
                var isSystem = u.username === 'AcroBot' || u.username === 'System';
                var canDelete = !me && !isSystem;
                var currentRank = (u.rank || 'rookie').toLowerCase();
                if (['rookie', 'bro', 'fam', 'super_admin'].indexOf(currentRank) === -1) currentRank = 'rookie';
                var label = escapeHtml(u.username) + (u.online ? ' <span style="color:#4ade80;">●</span>' : '') + (me ? ' (you)' : '');
                html += '<div class="user-row" style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">';
                html += '<span style="min-width:120px;">' + label + '</span>';
                html += '<select data-user-id="' + u.id + '" class="user-rank-select" ' + (me ? 'disabled title="You cannot change your own rank" ' : '') + ' style="background:#27272a;border:1px solid #3f3f46;color:#e4e4e7;padding:0.25rem 0.5rem;border-radius:4px;font-size:0.9rem;">';
                ranks.forEach(function(r) {
                    html += '<option value="' + escapeAttr(r.value) + '"' + (currentRank === r.value ? ' selected' : '') + '>' + escapeHtml(r.label) + '</option>';
                });
                html += '</select>';
                if (canDelete) html += '<button type="button" class="settings-delete-user" data-user-id="' + u.id + '" data-username="' + escapeAttr(u.username) + '" style="padding:0.25rem 0.5rem;font-size:0.8rem;background:#7f1d1d;border:none;border-radius:4px;color:#fecaca;cursor:pointer;">Delete</button>';
                html += '</div>';
            });
            html += '<div id="rolePermissionsSection" style="margin-top:1rem;"><p style="color:#71717a;">Loading role permissions…</p></div>';
            html += '<div class="user-row" style="margin-top:1.5rem;"><button type="button" id="settingsSaveBtn" style="padding:0.5rem 1.25rem;background:#6366f1;border:none;border-radius:8px;color:#fff;font-size:0.95rem;cursor:pointer;">Save changes</button></div>';
        } else {
            html += '<div class="user-row" style="margin-top:1.5rem;"><button type="button" id="settingsSaveBtn" style="padding:0.5rem 1.25rem;background:#6366f1;border:none;border-radius:8px;color:#fff;font-size:0.95rem;cursor:pointer;">Save changes</button></div>';
        }
        div.innerHTML = html;
        messagesEl.appendChild(div);
        settingsPendingSettings = { acrobot: null, ranks: {}, rolePerms: {}, theme: null, bgColor: null };
        var acrobotToggle = document.getElementById('acrobotActiveToggle');
        if (acrobotToggle) {
            acrobotToggle.addEventListener('change', function() {
                settingsPendingSettings.acrobot = acrobotToggle.checked;
            });
        }
        div.querySelectorAll('select.user-rank-select').forEach(function(sel) {
            var uid = parseInt(sel.getAttribute('data-user-id'), 10);
            if (uid === currentUserId) return;
            sel.addEventListener('change', function() {
                var rank = sel.value;
                if (rank) settingsPendingSettings.ranks[uid] = rank;
            });
        });
        var resetStatsBtn = div.querySelector('#resetStatsDataBtn');
        if (resetStatsBtn) {
            resetStatsBtn.addEventListener('click', function() {
                var typed = prompt('Type RESET (all caps) to delete all messages in all channels. This cannot be undone.');
                if (typed !== 'RESET') {
                    if (typed !== null) setStatus('Reset cancelled. You must type RESET exactly.');
                    return;
                }
                socket.emit('reset_stats_data', { confirm: 'RESET' });
            });
        }
        div.querySelectorAll('button.settings-delete-room').forEach(function(btn) {
            var rid = parseInt(btn.getAttribute('data-room-id'), 10);
            var rname = btn.getAttribute('data-room-name') || '';
            btn.addEventListener('click', function() {
                if (!confirm('Delete channel "' + rname + '" and all its messages?')) return;
                socket.emit('delete_room', { room_id: rid, from_settings: true });
            });
        });
        div.querySelectorAll('button.settings-wipe-room').forEach(function(btn) {
            var rid = parseInt(btn.getAttribute('data-room-id'), 10);
            var rname = btn.getAttribute('data-room-name') || '';
            btn.addEventListener('click', function() {
                if (!confirm('Wipe all chat history from "' + rname + '"? This cannot be undone.')) return;
                socket.emit('wipe_room_history', { room_id: rid });
            });
        });
        div.querySelectorAll('button.settings-delete-user').forEach(function(btn) {
            var uid = parseInt(btn.getAttribute('data-user-id'), 10);
            var uname = btn.getAttribute('data-username') || '?';
            btn.addEventListener('click', function() {
                if (!confirm('Permanently delete user "' + uname + '"? This cannot be undone.')) return;
                socket.emit('delete_user', { target_user_id: uid });
            });
        });
        var chatBgColorEl = document.getElementById('chatBgColor');
        if (chatBgColorEl) {
            chatBgColorEl.value = localStorage.getItem('chatBgColor') || '#0f0f12';
            chatBgColorEl.addEventListener('input', function() {
                settingsPendingSettings.bgColor = this.value;
            });
        }
        div.querySelectorAll('.theme-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var theme = this.getAttribute('data-theme') || 'dark';
                settingsPendingSettings.theme = theme;
                div.querySelectorAll('.theme-btn').forEach(function(b) { b.classList.remove('active'); if (b.getAttribute('data-theme') === theme) b.classList.add('active'); });
            });
        });
        var saveBtn = document.getElementById('settingsSaveBtn');
        if (saveBtn) {
            saveBtn.addEventListener('click', function() {
                if (!settingsPendingSettings) return;
                if (settingsPendingSettings.theme != null) applyTheme(settingsPendingSettings.theme);
                if (settingsPendingSettings.bgColor != null) {
                    localStorage.setItem('chatBgColor', settingsPendingSettings.bgColor);
                    applyChatBackgroundColor();
                }
                if (settingsPendingSettings.acrobot != null && isSuperAdmin) {
                    acrobotActive = settingsPendingSettings.acrobot;
                    socket.emit('set_acrobot_active', { active: acrobotActive });
                }
                Object.keys(settingsPendingSettings.ranks || {}).forEach(function(uid) {
                    var rank = settingsPendingSettings.ranks[uid];
                    if (rank) socket.emit('set_user_rank', { target_user_id: parseInt(uid, 10), rank: rank });
                });
                var rp = settingsPendingSettings.rolePerms || {};
                Object.keys(rp).forEach(function(role) {
                    Object.keys(rp[role] || {}).forEach(function(perm) {
                        socket.emit('set_role_permission', { role: role, permission: perm, allowed: rp[role][perm] });
                    });
                });
                settingsPendingSettings = { acrobot: null, ranks: {}, rolePerms: {}, theme: null, bgColor: null };
                var toast = document.createElement('div');
                toast.className = 'ping-toast';
                toast.style.background = '#166534';
                toast.textContent = 'Settings saved.';
                document.body.appendChild(toast);
                setTimeout(function() { toast.remove(); }, 2000);
            });

    function applyChatBackgroundColor() {
        var val = localStorage.getItem('chatBgColor') || '#0f0f12';
        var el = document.querySelector('.chat-area');
        if (el) el.style.backgroundColor = val;
    }

    function applyTheme(theme) {
        theme = theme || localStorage.getItem('chitchatTheme') || 'dark';
        localStorage.setItem('chitchatTheme', theme);
        document.body.classList.remove('theme-light');
        if (theme === 'light') document.body.classList.add('theme-light');
    }

    function roomsInOrder() {
        var byId = {};
        allRooms.forEach(function(r) { byId[r.id] = r; });
        var ordered = [];
        roomOrderIds.forEach(function(rid) {
            if (byId[rid]) { ordered.push(byId[rid]); delete byId[rid]; }
        });
        Object.keys(byId).forEach(function(rid) { ordered.push(byId[rid]); });
        return ordered;
    }

    function dmOtherUsername(r) {
        if (!r || !r.is_dm) return null;
        return r.created_by_id === currentUserId ? (r.dm_with_username || '?') : (r.created_by_username || '?');
    }

    function applyMessagesSectionHeight() {
        if (messageListItemsEl) {
            messageListItemsEl.style.flex = '0 0 ' + Math.max(40, Math.min(300, messagesSectionHeight)) + 'px';
        }
    }

    function renderRoomList(rooms, activeRoom) {
        if (rooms && rooms.length) {
            allRooms = rooms;
            if (roomOrderIds.length === 0) roomOrderIds = rooms.map(function(r) { return r.id; });
        }
        currentRoom = activeRoom || currentRoom;
        var ordered = roomsInOrder();
        var channels = ordered.filter(function(r) { return !r.is_dm; });
        var dms = ordered.filter(function(r) { return r.is_dm; });
        function channelItemHtml(r) {
            var isActive = currentRoom && r.id === currentRoom.id && !showingSettings;
            var protectedChannels = ['general', 'Stats', 'Acrophobia', 'System Events'];
            var canDelete = protectedChannels.indexOf(r.name) === -1;
            var isOwner = r.created_by_id === currentUserId;
            var canEdit = isSuperAdmin || isOwner || (userPermissions && userPermissions.update_room);
            var canDeleteRoom = (isSuperAdmin || isOwner || (userPermissions && userPermissions.delete_room)) && canDelete;
            var hasUnread = unreadRooms[r.id] || (unreadMentions[r.id] && unreadMentions[r.id].size);
            return '<div class="room-item' + (isActive ? ' active' : '') + '" draggable="true" data-room-id="' + r.id + '">' +
                '<span class="room-item-grip" title="Drag to reorder">⋮⋮</span>' +
                '<span class="room-item-unread-dot" style="display:' + (hasUnread ? 'inline-block' : 'none') + ';" title="Unread"></span>' +
                '<span class="room-item-name">' + escapeHtml(r.name) + '</span>' +
                '<span class="room-item-actions">' +
                (canEdit ? '<button type="button" class="edit" title="Edit">✎</button>' : '') +
                (canDeleteRoom ? '<button type="button" class="delete" title="Delete">×</button>' : '') +
                '</span></div>';
        }
        function dmItemHtml(r) {
            var isActive = currentRoom && r.id === currentRoom.id && !showingSettings;
            var displayName = 'DM: ' + (dmOtherUsername(r) || '?');
            var hasUnread = unreadRooms[r.id] || (unreadMentions[r.id] && unreadMentions[r.id].size);
            return '<div class="room-item dm-item' + (isActive ? ' active' : '') + '" draggable="true" data-room-id="' + r.id + '">' +
                '<span class="room-item-grip" title="Drag to reorder">⋮⋮</span>' +
                '<span class="room-item-unread-dot" style="display:' + (hasUnread ? 'inline-block' : 'none') + ';" title="Unread"></span>' +
                '<span class="room-item-name">' + escapeHtml(displayName) + '</span>' +
                '<span class="room-item-actions"><button type="button" class="delete" title="Delete DM">×</button></span></div>';
        }
        roomListItemsEl.innerHTML = channels.length ? channels.map(channelItemHtml).join('') : '<div class="room-item" style="cursor:default;color:#71717a;">No channels</div>';
        messageListItemsEl.innerHTML = dms.length ? dms.map(dmItemHtml).join('') : '<div class="room-item" style="cursor:default;color:#71717a;">No messages</div>';

        function attachChannelListeners(container, list) {
            container.querySelectorAll('.room-item[data-room-id]').forEach(function(el) {
                var rid = parseInt(el.getAttribute('data-room-id'), 10);
                var room = list.find(function(r) { return r.id === rid; });
                if (!room) return;
                el.addEventListener('click', function(ev) {
                    if (ev.target.closest('.room-item-actions') || ev.target.closest('.room-item-grip')) return;
                    showingSettings = false;
                    switchRoom(rid);
                });
                var editBtn = el.querySelector('button.edit');
                if (editBtn) editBtn.addEventListener('click', function(e) { e.stopPropagation(); editRoom(rid); });
                var delBtn = el.querySelector('button.delete');
                if (delBtn) delBtn.addEventListener('click', function(e) { e.stopPropagation(); deleteRoom(rid); });
                el.addEventListener('dragstart', function(e) {
                    e.dataTransfer.setData('text/plain', rid);
                    e.dataTransfer.effectAllowed = 'move';
                    el.classList.add('dragging');
                });
                el.addEventListener('dragend', function() { el.classList.remove('dragging'); });
                el.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    container.querySelectorAll('.room-item').forEach(function(x) { x.classList.remove('drag-over'); });
                    el.classList.add('drag-over');
                });
                el.addEventListener('dragleave', function() { el.classList.remove('drag-over'); });
                el.addEventListener('drop', function(e) {
                    e.preventDefault();
                    el.classList.remove('drag-over');
                    var fromId = parseInt(e.dataTransfer.getData('text/plain'), 10);
                    if (fromId === rid) return;
                    var channelIds = channels.map(function(r) { return r.id; });
                    var dmIds = dms.map(function(r) { return r.id; });
                    var idxFrom = channelIds.indexOf(fromId);
                    var idxTo = channelIds.indexOf(rid);
                    if (idxFrom === -1 || idxTo === -1) return;
                    channelIds.splice(idxFrom, 1);
                    channelIds.splice(idxTo, 0, fromId);
                    roomOrderIds = channelIds.concat(dmIds);
                    socket.emit('save_room_order', { room_ids: roomOrderIds });
                    renderRoomList(null, currentRoom);
                });
            });
        }
        function attachDmListeners(container, list) {
            container.querySelectorAll('.room-item[data-room-id]').forEach(function(el) {
                var rid = parseInt(el.getAttribute('data-room-id'), 10);
                var room = list.find(function(r) { return r.id === rid; });
                if (!room) return;
                el.addEventListener('click', function(ev) {
                    if (ev.target.closest('.room-item-actions') || ev.target.closest('.room-item-grip')) return;
                    showingSettings = false;
                    switchRoom(rid);
                });
                var delBtn = el.querySelector('button.delete');
                if (delBtn) delBtn.addEventListener('click', function(e) { e.stopPropagation(); deleteRoom(rid); });
                el.addEventListener('dragstart', function(e) {
                    e.dataTransfer.setData('text/plain', rid);
                    e.dataTransfer.effectAllowed = 'move';
                    el.classList.add('dragging');
                });
                el.addEventListener('dragend', function() { el.classList.remove('dragging'); });
                el.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    container.querySelectorAll('.room-item').forEach(function(x) { x.classList.remove('drag-over'); });
                    el.classList.add('drag-over');
                });
                el.addEventListener('dragleave', function() { el.classList.remove('drag-over'); });
                el.addEventListener('drop', function(e) {
                    e.preventDefault();
                    el.classList.remove('drag-over');
                    var fromId = parseInt(e.dataTransfer.getData('text/plain'), 10);
                    if (fromId === rid) return;
                    var channelIds = channels.map(function(r) { return r.id; });
                    var dmIds = dms.map(function(r) { return r.id; });
                    var idxFrom = dmIds.indexOf(fromId);
                    var idxTo = dmIds.indexOf(rid);
                    if (idxFrom === -1 || idxTo === -1) return;
                    dmIds.splice(idxFrom, 1);
                    dmIds.splice(idxTo, 0, fromId);
                    roomOrderIds = channelIds.concat(dmIds);
                    socket.emit('save_room_order', { room_ids: roomOrderIds });
                    renderRoomList(null, currentRoom);
                });
            });
        }
        attachChannelListeners(roomListItemsEl, channels);
        attachDmListeners(messageListItemsEl, dms);
    }

    function switchRoom(roomId) {
        if (currentRoom && currentRoom.id === roomId) return;
        socket.emit('join_room', { room_id: roomId });
        var rl = document.getElementById('roomList');
        var ov = document.getElementById('sidebarOverlay');
        if (rl) rl.classList.remove('open');
        if (ov) ov.classList.remove('visible');
    }

    function editRoom(roomId) {
        var room = allRooms.find(function(r) { return r.id === roomId; });
        if (!room) return;
        var name = prompt('Room name:', room.name);
        if (name === null || !name.trim()) return;
        socket.emit('update_room', { room_id: roomId, name: name.trim() });
    }

    function deleteRoom(roomId) {
        var room = allRooms.find(function(r) { return r.id === roomId; });
        if (!room || room.name === 'general') return;
        if (!confirm('Delete room "' + room.name + '" and all its messages?')) return;
        socket.emit('delete_room', { room_id: roomId });
    }

    function showNewRoomPrompt() {
        var name = prompt('New room name:');
        if (name === null || !name.trim()) return;
        socket.emit('create_room', { name: name.trim() });
    }

    function renderUserList(users) {
        if (!users || !users.length) return;
        const online = users.filter(function(u) { return u.online; });
        const offline = users.filter(function(u) { return !u.online; });
        function itemHtml(u) {
            const isMe = u.id === currentUserId;
            var statusCls = u.online ? (u.user_status === 'away' ? 'away' : u.user_status === 'dnd' ? 'dnd' : 'online') : 'offline';
            const cls = 'user-item ' + statusCls + (isMe ? ' me' : '');
            var displayLabel = (u.display_name && u.display_name.trim()) ? u.display_name : u.username;
            var label = escapeHtml(displayLabel) + (isMe ? ' (you)' : '');
            if (u.is_system_user) label = escapeHtml(u.username) + ' <span class="muted">(service)</span>';
            var presence = '';
            if (u.online && u.current_room_name && !u.is_system_user) presence = '<span class="user-item-presence">in ' + escapeHtml(u.current_room_name) + '</span>';
            return '<div class="' + cls + '" data-user-id="' + u.id + '" data-username="' + escapeAttr(u.username || '') + '"><span class="user-dot"></span><span class="user-item-name">' + label + '</span>' + presence + '</div>';
        }
        userListOnlineItems.innerHTML = online.length ? online.map(itemHtml).join('') : '<div class="user-item offline"><span class="user-dot"></span><span class="muted">No one online</span></div>';
        userListOfflineItems.innerHTML = offline.length ? offline.map(itemHtml).join('') : '<div class="user-item offline"><span class="user-dot"></span><span class="muted">No one offline</span></div>';
    }

    socket = io({ withCredentials: true{% if socket_polling_only %}, transports: ['polling']{% endif %} });

    var socketWasDisconnected = false;
    socket.on('connect', function() {
        setConnected(true);
        if (socketWasDisconnected) {
            showPingToast('Reconnected');
            socketWasDisconnected = false;
        }
        if (currentRoom) socket.emit('join_room', { room_id: currentRoom.id });
        else socket.emit('join_room', {});
    });

    socket.on('disconnect', function() { setConnected(false); setStatus('Disconnected'); socketWasDisconnected = true; });
    socket.on('connect_error', function(err) {
        setStatus('Connection failed' + (err && err.message ? ': ' + err.message : ''));
    });

    socket.on('room_joined', function(data) {
        showingSettings = false;
        currentRoom = data.room || currentRoom;
        if (currentRoom) clearUnreadForRoom(currentRoom.id);
        if (data.users) allUsersWithStatus = data.users;
        if (data.rooms) renderRoomList(data.rooms, data.room);
        if (currentRoom && data.room_muted_in_room) {
            roomMutedInRoom[currentRoom.id] = new Set(data.room_muted_in_room);
        }
        hasMoreMessages = data.has_more === true;
        typingUsers = {};
        updateTypingIndicator();
        if (data.stats) renderStatsView(data.stats);
        else renderAllMessages(data.history || []);
        if (data.users) renderUserList(data.users);
        if (currentRoom && currentRoom.name === 'Acrophobia' && data.acrophobia) {
            setAcroPhase(data.acrophobia.phase, data.acrophobia.end_time);
        } else {
            setAcroPhase('idle', null);
        }
    });

    socket.on('user_typing', function(data) {
        if (!currentRoom || data.room_id !== currentRoom.id || data.user_id === currentUserId) return;
        if (typingUsers[data.user_id] && typingUsers[data.user_id].timeout) clearTimeout(typingUsers[data.user_id].timeout);
        typingUsers[data.user_id] = {
            username: data.username || 'Someone',
            timeout: setTimeout(function() {
                delete typingUsers[data.user_id];
                updateTypingIndicator();
            }, 5000)
        };
        updateTypingIndicator();
    });

    socket.on('older_messages', function(data) {
        if (!currentRoom) return;
        hasMoreMessages = data.has_more === true;
        if (loadMoreWrap) loadMoreWrap.style.display = hasMoreMessages ? 'block' : 'none';
        prependOlderMessages(data.messages || []);
    });

    socket.on('user_profile', function(data) {
        if (data.user) showProfileModal(data.user);
    });

    socket.on('whois_result', function(data) {
        if (data) showWhoisModal(data);
    });

    socket.on('kicked_from_room', function(data) {
        if (data.room_id && currentRoom && currentRoom.id === data.room_id) {
            var general = allRooms.find(function(r) { return r.name === 'general'; });
            if (general) switchRoom(general.id);
            showPingToast('You were kicked from ' + (currentRoom ? currentRoom.name : '') + '.');
        }
    });

    socket.on('kicked_from_app', function(data) {
        showPingToast(data.message || 'You were kicked from the app.');
        if (socket) socket.disconnect();
        window.location.href = '{{ url_for("login_page") }}?kicked=1';
    });

    socket.on('rooms_list', function(data) {
        if (data.rooms) {
            allRooms = data.rooms;
            roomOrderIds = data.rooms.map(function(r) { return r.id; });
            renderRoomList(null, currentRoom);
        }
    });

    socket.on('rooms_updated', function(data) {
        if (data.rooms) {
            allRooms = data.rooms;
            if (roomOrderIds.length === 0) roomOrderIds = data.rooms.map(function(r) { return r.id; });
            else {
                var existingIds = {};
                data.rooms.forEach(function(r) { existingIds[r.id] = true; });
                roomOrderIds = roomOrderIds.filter(function(rid) { return existingIds[rid]; });
                data.rooms.forEach(function(r) {
                    if (roomOrderIds.indexOf(r.id) === -1) roomOrderIds.push(r.id);
                });
            }
            if (currentRoom) {
                var refreshed = data.rooms.find(function(r) { return r.id === currentRoom.id; });
                if (refreshed) currentRoom = refreshed;
            }
            renderRoomList(null, currentRoom);
        }
    });

    socket.on('room_renamed', function(data) {
        if (data.room && currentRoom && currentRoom.id === data.room_id) currentRoom = data.room;
    });

    socket.on('room_created', function(data) {
        if (data.room) {
            allRooms = allRooms.concat([data.room]);
            roomOrderIds.push(data.room.id);
            renderRoomList(null, currentRoom);
            switchRoom(data.room.id);
        }
    });

    socket.on('dm_room', function(data) {
        if (!data.room) return;
        var existing = allRooms.find(function(r) { return r.id === data.room.id; });
        if (!existing) {
            allRooms = allRooms.concat([data.room]);
            roomOrderIds.push(data.room.id);
        }
        renderRoomList(null, currentRoom);
        switchRoom(data.room.id);
    });

    socket.on('room_history_wiped', function(data) {
        if (data.room_id && currentRoom && currentRoom.id === data.room_id) {
            messagesEl.innerHTML = '';
            var toast = document.createElement('div');
            toast.className = 'ping-toast';
            toast.style.background = '#166534';
            toast.textContent = 'Room history wiped. ' + (data.deleted || 0) + ' message(s) removed.';
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }
    });

    socket.on('room_deleted', function(data) {
        if (data.room_id && currentRoom && currentRoom.id === data.room_id) {
            var general = allRooms.find(function(r) { return r.name === 'general'; });
            if (general) switchRoom(general.id);
        }
        allRooms = allRooms.filter(function(r) { return r.id !== data.room_id; });
        roomOrderIds = roomOrderIds.filter(function(id) { return id !== data.room_id; });
        renderRoomList(null, currentRoom);
    });

    socket.on('user_list_updated', function(data) {
        if (data.users) {
            allUsersWithStatus = data.users;
            renderUserList(data.users);
            if (showingSettings) renderSettingsView();
        }
    });

    socket.on('topic_updated', function(data) {
        if (data.room_id && data.room) {
            var idx = allRooms.findIndex(function(r) { return r.id === data.room_id; });
            if (idx !== -1) allRooms[idx] = data.room;
            if (currentRoom && currentRoom.id === data.room_id) {
                currentRoom = data.room;
                renderChannelTopic(currentRoom);
            }
            showTopicToast(data.set_by_username);
        }
    });

    socket.on('acrobot_status', function(data) {
        acrobotActive = data.active !== false;
        var toggle = document.getElementById('acrobotActiveToggle');
        if (toggle) toggle.checked = acrobotActive;
    });

    socket.on('role_permissions', function(data) {
        var section = document.getElementById('rolePermissionsSection');
        if (!section || !data.permissions || !isSuperAdmin) return;
        var perms = data.permissions;
        var permLabels = {
            create_room: 'Create channels',
            update_room: 'Edit channel names',
            delete_room: 'Delete channels',
            kick_user: 'Kick users',
            set_user_rank: 'Set user rankings',
            acrobot_control: 'AcroBot on/off',
            reset_stats: 'Reset Stats data',
            export_all: 'Export all rooms'
        };
        var roles = [
            { id: 'rookie', label: 'Rookie' },
            { id: 'bro', label: 'Bro' },
            { id: 'fam', label: 'Fam' }
        ];
        var html = '<h2>Role Permissions</h2><p style="color:#a1a1aa;font-size:0.9rem;margin:0 0 0.5rem;">Surfer Girl can grant these permissions to Rookie, Bro, or Fam. Surfer Girl always has full access.</p>';
        html += '<table style="font-size:0.85rem;border-collapse:collapse;"><tr><th style="text-align:left;padding:0.35rem 0.75rem 0.35rem 0;">Permission</th>';
        roles.forEach(function(r) { html += '<th style="padding:0.35rem 0.5rem;">' + escapeHtml(r.label) + '</th>'; });
        html += '</tr>';
        Object.keys(permLabels).forEach(function(perm) {
            html += '<tr><td style="padding:0.35rem 0.75rem 0.35rem 0;">' + escapeHtml(permLabels[perm]) + '</td>';
            roles.forEach(function(r) {
                var checked = perms[r.id] && perms[r.id][perm];
                html += '<td style="padding:0.35rem 0.5rem;"><input type="checkbox" class="role-perm-cb" data-role="' + escapeAttr(r.id) + '" data-permission="' + escapeAttr(perm) + '" ' + (checked ? 'checked' : '') + '></td>';
            });
            html += '</tr>';
        });
        html += '</table>';
        section.innerHTML = html;
        if (!settingsPendingSettings) settingsPendingSettings = { acrobot: null, ranks: {}, rolePerms: {}, theme: null, bgColor: null };
        if (!settingsPendingSettings.rolePerms) settingsPendingSettings.rolePerms = {};
        section.querySelectorAll('.role-perm-cb').forEach(function(cb) {
            cb.addEventListener('change', function() {
                var role = this.getAttribute('data-role');
                var perm = this.getAttribute('data-permission');
                if (!settingsPendingSettings.rolePerms[role]) settingsPendingSettings.rolePerms[role] = {};
                settingsPendingSettings.rolePerms[role][perm] = this.checked;
            });
        });
    });

    socket.on('stats_reset', function(data) {
        var n = (data && data.deleted) || 0;
        var el = document.createElement('div');
        el.className = 'ping-toast';
        el.style.background = '#166534';
        el.textContent = 'Stats data reset. ' + n + ' message(s) deleted.';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 5000);
        if (currentRoom && currentRoom.name && currentRoom.name.toLowerCase() === 'stats') {
            socket.emit('join_room', { room_id: currentRoom.id });
        }
    });

    socket.on('new_message', function(msg) {
        if (currentRoom && msg.room_id !== currentRoom.id) {
            addUnreadForRoom(msg.room_id);
            return;
        }
        if (!msg.message_type) msg.message_type = 'chat';
        if (msg.room_id == null && currentRoom) msg.room_id = currentRoom.id;
        const el = renderMessage(msg, msg.user_id === currentUserId);
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    socket.on('message_edited', function(msg) {
        if (!currentRoom || msg.room_id !== currentRoom.id) return;
        var el = messagesEl.querySelector('.msg[data-msg-id="' + msg.id + '"]');
        if (el) {
            var contentEl = el.querySelector('.msg-content');
            if (contentEl) {
                var raw = msg.content || '';
                var contentHtml = typeof marked !== 'undefined' ? marked.parse(raw) : escapeHtml(raw);
                contentHtml = contentHtml.replace(/(https?:\/\/[^\s<>"']+)/g, function(match) {
                    var offset = arguments[arguments.length - 2];
                    var fullStr = arguments[arguments.length - 1];
                    if (offset > 0 && fullStr[offset - 1] === '"') return match;
                    return '<a href="' + escapeAttr(match) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(match) + '</a>';
                });
                contentEl.innerHTML = contentHtml;
            }
            var editedWrap = el.querySelector('.msg-edited');
            if (msg.edited_at) {
                if (!editedWrap) {
                    editedWrap = document.createElement('div');
                    editedWrap.className = 'msg-edited';
                    var after = el.querySelector('.msg-content');
                    if (after) after.parentNode.insertBefore(editedWrap, after.nextSibling);
                    else el.appendChild(editedWrap);
                }
                editedWrap.textContent = 'edited ' + formatTime(msg.edited_at);
                editedWrap.style.display = '';
            } else if (editedWrap) editedWrap.style.display = 'none';
        }
    });

    socket.on('message_deleted', function(data) {
        if (!currentRoom || data.room_id !== currentRoom.id) return;
        var el = messagesEl.querySelector('.msg[data-msg-id="' + data.message_id + '"]');
        if (el) el.remove();
    });

    socket.on('user_mentioned', function(data) {
        addUnreadMention(data.room_id, data.message_id);
        var roomEl = document.querySelector('.room-item[data-room-id="' + data.room_id + '"]');
        if (roomEl) roomEl.classList.add('mentioned');
        if (currentRoom && currentRoom.id === data.room_id) {
            var msgEl = messagesEl.querySelector('.msg[data-msg-id="' + data.message_id + '"]');
            if (msgEl) msgEl.classList.add('mentioned');
        }
        showPingToast((data.from_username || 'Someone') + ' mentioned you');
    });

    socket.on('user_pinged', function(data) {
        if (data.to_user_id === currentUserId) showPingToast(data.from_username || 'Someone');
    });

    socket.on('away_message', function(data) {
        var el = document.createElement('div');
        el.className = 'ping-toast';
        el.style.background = '#a16207';
        el.textContent = (data.from_username || 'User') + ' is away: ' + (data.message || '');
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 5000);
    });

    socket.on('room_muted_updated', function(data) {
        if (data.room_id) {
            roomMutedInRoom[data.room_id] = new Set(data.room_muted_in_room || []);
            if (currentRoom && currentRoom.id === data.room_id) {
                messagesEl.querySelectorAll('.msg[data-user-id]').forEach(function(el) {
                    var uid = parseInt(el.getAttribute('data-user-id'), 10);
                    el.classList.toggle('hidden', roomMutedInRoom[data.room_id].has(uid));
                });
            }
        }
    });

    socket.on('error', function(data) { setStatus('Error: ' + (data.message || 'Unknown')); });

    socket.on('acrophobia_phase', function(data) {
        if (!currentRoom || currentRoom.name !== 'Acrophobia') return;
        setAcroPhase(data.phase, data.end_time);
    });

    socket.on('report_submitted', function(data) {
        var el = document.createElement('div');
        el.className = 'ping-toast';
        el.style.background = '#166534';
        el.textContent = data.message || 'Report submitted.';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
    });

    var typingEmitTimer = null;
    inputEl.addEventListener('input', function() {
        if (!currentRoom || currentRoom.name && currentRoom.name.toLowerCase() === 'stats') return;
        if (typingEmitTimer) clearTimeout(typingEmitTimer);
        typingEmitTimer = setTimeout(function() {
            socket.emit('user_typing', { room_id: currentRoom.id });
            typingEmitTimer = null;
        }, 400);
    });

    function sendMessageWithAttachment() {
        var content = inputEl.value.trim();
        if ((!content && !pendingAttachment) || !currentRoom) return;
        var payload = { room_id: currentRoom.id, content: content || '' };
        if (replyToMessageId) payload.parent_id = replyToMessageId;
        if (pendingAttachment) {
            payload.attachment_url = pendingAttachment.url;
            payload.attachment_filename = pendingAttachment.filename;
        }
        socket.emit('send_message', payload);
        inputEl.value = '';
        replyToMessageId = null;
        replyToContent = null;
        replyToDisplayName = null;
        pendingAttachment = null;
        var attachBtn = document.getElementById('attachBtn');
        if (attachBtn) attachBtn.title = 'Attach file or image';
    }

    sendForm.addEventListener('submit', function(e) {
        e.preventDefault();
        sendMessageWithAttachment();
    });

    var fileInput = document.getElementById('fileInput');
    var attachBtn = document.getElementById('attachBtn');
    if (fileInput && attachBtn) {
        attachBtn.addEventListener('click', function() { fileInput.click(); });
        fileInput.addEventListener('change', function() {
            var file = fileInput.files && fileInput.files[0];
            if (!file) return;
            var maxMb = 5;
            if (file.size > maxMb * 1024 * 1024) {
                showUploadToast('File too large (max ' + maxMb + ' MB). Your file: ' + (file.size / 1024 / 1024).toFixed(1) + ' MB.', true);
                fileInput.value = '';
                return;
            }
            var fd = new FormData();
            fd.append('file', file);
            attachBtn.disabled = true;
            attachBtn.title = 'Uploading…';
            fetch('/upload', { method: 'POST', body: fd, credentials: 'same-origin' })
                .then(function(r) {
                    if (!r.ok) throw new Error(r.status === 413 ? 'File too large (max 5 MB)' : 'Upload failed (' + r.status + ')');
                    return r.json().catch(function() { throw new Error('Invalid server response'); });
                })
                .then(function(data) {
                    if (data && data.error) throw new Error(data.error);
                    if (!data || !data.url) throw new Error('No file URL returned');
                    pendingAttachment = { url: data.url, filename: data.filename };
                    attachBtn.title = 'Attached: ' + data.filename + ' — send to post';
                    sendMessageWithAttachment();
                })
                .catch(function(err) {
                    var msg = err && err.message ? err.message : 'Upload failed';
                    attachBtn.title = 'Attach file or image';
                    showUploadToast(msg, true);
                })
                .finally(function() {
                    attachBtn.disabled = false;
                    fileInput.value = '';
                });
        });
    }

    if (inputEl) {
        inputEl.addEventListener('paste', function(e) {
            var items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    e.preventDefault();
                    var file = items[i].getAsFile();
                    if (!file) return;
                    var fd = new FormData();
                    fd.append('file', file);
                    fetch('/upload', { method: 'POST', body: fd, credentials: 'same-origin' })
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            if (data.error) throw new Error(data.error);
                            pendingAttachment = { url: data.url, filename: data.filename };
                            if (!inputEl.value.trim()) sendMessageWithAttachment();
                            else {
                                var ab = document.getElementById('attachBtn');
                                if (ab) ab.title = 'Attached: ' + data.filename + ' — send to post';
                            }
                        })
                        .catch(function() {});
                    break;
                }
            }
        });
    }

    if (loadMoreBtn) loadMoreBtn.addEventListener('click', function() {
        if (!currentRoom || !hasMoreMessages) return;
        var firstMsg = messagesEl.querySelector('.msg[data-msg-id]');
        var beforeId = firstMsg ? parseInt(firstMsg.getAttribute('data-msg-id'), 10) : 0;
        if (beforeId) socket.emit('load_more_messages', { room_id: currentRoom.id, before_id: beforeId });
    });

    if (newRoomBtn) newRoomBtn.addEventListener('click', showNewRoomPrompt);

    function showSettings() {
        showingSettings = true;
        currentRoom = null;
        renderRoomList(allRooms.length ? allRooms : null, null);
        renderSettingsView();
    }
    if (settingsBtn) settingsBtn.addEventListener('click', showSettings);

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            hideContextMenu();
            hideMessageContextMenu();
            hideAllModals();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            if (inputEl) inputEl.focus();
        }
    });

    if (searchToggleBtn && searchDrawerEl) {
        searchToggleBtn.addEventListener('click', function() {
            searchDrawerEl.classList.toggle('open');
        });
    }
    var searchForm = document.getElementById('searchForm');
    var searchInput = document.getElementById('searchInput');
    if (searchForm && searchInput) {
        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            var query = searchInput.value.trim();
            if (!query) return;
            var payload = { query: query };
            if (currentRoom) payload.room_id = currentRoom.id;
            socket.emit('search_messages', payload);
        });
    }

    socket.on('search_results', function(data) {
        showSearchResultsModal(data.messages || [], data.query || '');
    });

    applyTheme();
    applyChatBackgroundColor();
    applyMessagesSectionHeight();

    (function setupMobileSidebars() {
        var menuBtn = document.getElementById('menuToggleBtn');
        var usersBtn = document.getElementById('usersToggleBtn');
        var overlay = document.getElementById('sidebarOverlay');
        var roomList = document.getElementById('roomList');
        var userList = document.getElementById('userList');
        function closeSidebars() {
            if (roomList) roomList.classList.remove('open');
            if (userList) userList.classList.remove('open');
            if (overlay) overlay.classList.remove('visible');
        }
        function openRoomList() {
            closeSidebars();
            if (roomList) roomList.classList.add('open');
            if (overlay) overlay.classList.add('visible');
        }
        function openUserList() {
            closeSidebars();
            if (userList) userList.classList.add('open');
            if (overlay) overlay.classList.add('visible');
        }
        if (menuBtn && roomList) menuBtn.addEventListener('click', function() {
            if (roomList.classList.contains('open')) closeSidebars();
            else openRoomList();
        });
        if (usersBtn && userList) usersBtn.addEventListener('click', function() {
            if (userList.classList.contains('open')) closeSidebars();
            else openUserList();
        });
        if (overlay) overlay.addEventListener('click', closeSidebars);
        var settingsBtnMobile = document.getElementById('settingsBtnMobile');
        if (settingsBtnMobile) settingsBtnMobile.addEventListener('click', function() {
            closeSidebars();
            showSettings();
        });
    })();

    (function setupPanelResizer() {
        var resizer = document.getElementById('panelResizer');
        if (!resizer || !messageListItemsEl) return;
        var startY = 0;
        var startHeight = 0;
        function onMove(e) {
            var dy = e.clientY - startY;
            messagesSectionHeight = Math.max(40, Math.min(300, startHeight - dy));
            applyMessagesSectionHeight();
        }
        function onUp() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            localStorage.setItem('chitchatMessagesSectionHeight', String(messagesSectionHeight));
        }
        resizer.addEventListener('mousedown', function(e) {
            e.preventDefault();
            startY = e.clientY;
            startHeight = messagesSectionHeight;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            document.body.style.cursor = 'ns-resize';
            document.body.style.userSelect = 'none';
        });
    })();
})();
    </script>
</body>
</html>
