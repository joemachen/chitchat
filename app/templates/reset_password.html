<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
    <title>Reset password — No Homers Club</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <main class="auth-card">
        <div class="auth-logo-wrap">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="" class="auth-logo" aria-hidden="true">
            <h1>No Homers Club</h1>
        </div>
        <p class="subtitle">Reset password</p>
        <p class="muted">Enter your username and the invite code to set a new password.</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('reset_password_page') }}">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required autocomplete="username" placeholder="Your account username">
            <label for="invite_code">Invite code</label>
            <input id="invite_code" name="invite_code" type="text" required placeholder="Same code you used to register">
            <label for="new_password">New password</label>
            <input id="new_password" name="new_password" type="password" required autocomplete="new-password" minlength="4">
            <label for="confirm_password">Confirm new password</label>
            <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password" minlength="4">
            <button type="submit">Set new password</button>
        </form>
        <p class="footer"><a href="{{ url_for('login_page') }}">Back to log in</a></p>
    </main>
</body>
</html>
