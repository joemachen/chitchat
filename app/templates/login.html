<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — ChitChat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <main class="auth-card">
        <h1>ChitChat</h1>
        <p class="subtitle">Log in</p>
        {% if reset_success %}
        <p class="success">Password reset. You can log in with your new password.</p>
        {% endif %}
        {% if request.args.get('deleted') == '1' %}
        <p class="success">Your account has been deleted.</p>
        {% endif %}
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('login_page') }}">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required autocomplete="username">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">
            <label class="checkbox-label">
                <input type="checkbox" name="remember" value="1" id="remember" checked>
                Remember me
            </label>
            <button type="submit">Log in</button>
        </form>
        <p class="footer">
            <a href="{{ url_for('reset_password_page') }}">Forgot password?</a>
            &nbsp;·&nbsp;
            <a href="{{ url_for('register_page') }}">Register</a>
        </p>
    </main>
</body>
</html>
